# LoRA-GA Conversation config
# Status: EXTERNAL_REQUIRED
# Official repo: https://github.com/Outsider565/LoRA-GA
# Expected local path: external_repos/LoRA-GA
project:
  name: fbd-lora
  run_group: nlg-conversation-baseline
  status: EXTERNAL_REQUIRED
  method_class: external_repo
  external_repo: https://github.com/Outsider565/LoRA-GA
  external_local_path: external_repos/LoRA-GA

modality: nlg
task: conversation

model:
  backbone: mistralai/Mistral-7B-v0.1

dataset:
  name: pissa-dataset
  hf_path: fxmeng/pissa-dataset
  sub_task: conversation
  split: train
  max_samples: 100000
  prompt_template: alpaca
  max_seq_length: 2048

training:
  num_train_epochs: 1
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4

adapter:
  type: lora_ga
  name: lora_ga
  rank: 16
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
