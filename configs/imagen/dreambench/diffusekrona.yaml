# DiffuseKronA config
# Status: EXTERNAL_REQUIRED
# Official IBM repo: https://github.com/IBM/DiffuseKronA
# Expected local path: external_repos/DiffuseKronA
#
# To set up: git clone https://github.com/IBM/DiffuseKronA external_repos/DiffuseKronA
project:
  name: fbd-lora
  run_group: imagen-dreambench-baseline
  status: EXTERNAL_REQUIRED
  method_class: external_repo
  external_repo: https://github.com/IBM/DiffuseKronA
  external_local_path: external_repos/DiffuseKronA

modality: imagen
task: dreambench

model:
  backbone: runwayml/stable-diffusion-v1-5

dataset:
  name: dreambench
  root: data/dreambench
  concept_list: data/dreambench/concepts.json
  resolution: 512

training:
  max_train_steps: 1000
  train_batch_size: 1
  learning_rate: 1.0e-4

adapter:
  name: diffusekrona
  type: diffusekrona
