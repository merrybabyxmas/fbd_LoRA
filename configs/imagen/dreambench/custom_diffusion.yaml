# Custom Diffusion config
# Status: REAL via Hugging Face Diffusers official Custom Diffusion training
# Implementation: fbd_lora.imagen.train_custom_diffusion
# Official Diffusers path: diffusers.training_utils + custom diffusion pipeline
project:
  name: fbd-lora
  run_group: imagen-dreambench-baseline
  status: REAL
  method_class: diffusers_official
  notes: "Custom Diffusion via Diffusers official training. See https://huggingface.co/docs/diffusers/training/custom_diffusion"

modality: imagen
task: dreambench

model:
  backbone: CompVis/stable-diffusion-v1-4
  revision: null
  variant: null
  torch_dtype: fp16
  enable_xformers_memory_efficient_attention: true
  gradient_checkpointing: true

dataset:
  name: dreambench
  root: data/dreambench
  concept_list: data/dreambench/concepts.json
  resolution: 512
  center_crop: false
  random_flip: true

training:
  output_dir: null
  max_train_steps: 1000
  train_batch_size: 2
  gradient_accumulation_steps: 2
  learning_rate: 8.0e-5
  scale_lr: false
  lr_scheduler: constant
  lr_warmup_steps: 0
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_weight_decay: 1.0e-2
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  mixed_precision: fp16
  save_every_percent: 10
  validation_steps: 100
  freeze_model: crossattn_kv
  modifier_token: "<new1>"

adapter:
  name: custom_diffusion
  type: custom_diffusion

fbd:
  enabled: false

generation:
  prompts_file: data/dreambench/eval_prompts.json
  num_images_per_prompt: 4
  guidance_scale: 7.5
  num_inference_steps: 50
  seed: 42

evaluation:
  metrics:
    - clip_i
    - dino
    - clip_t
    - lpips_diversity
  reference_images_root: data/dreambench/reference_images

paths:
  output_root: outputs/runs
  result_root: results
  cache_root: .cache

wandb:
  enabled: true
  project: fbd-lora
  entity: null
  mode: online
  log_model: false
  tags:
    - custom_diffusion
    - dreambench

run:
  seed: 42
  deterministic: false
  resume_from_checkpoint: null
  save_every_percent: 10
  upload_to_gdrive: true
  dry_run: false
  debug: false
